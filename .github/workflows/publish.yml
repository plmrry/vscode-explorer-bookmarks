name: Publish

on:
  push:
    branches:
     - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@latest
      
      - name: Setup Node
        uses: actions/setup-node@latest
        with:
          node-version: 24

      - name: Install
        run: npm install
      
      - uses: HaaLeo/publish-vscode-extension@latest
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}         
          registryUrl: https://marketplace.visualstudio.comm
